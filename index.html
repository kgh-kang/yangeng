<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공학영어 문장 분석기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 헤더 -->
        <header class="header">
            <h1 class="logo">공학영어 문장 분석기</h1>
            <p class="tagline">강광현 제작</p>
        </header>

        <!-- 입력 -->
        <div class="input-area">
            <div class="input-wrap">
                <input
                    id="inp"
                    type="text"
                    placeholder="영어 문장을 입력하세요"
                    autocomplete="off"
                    spellcheck="false"
                    onkeydown="if(event.key==='Enter')go()"
                >
                <button class="btn-analyze" onclick="go()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    <span>분석</span>
                </button>
            </div>
        </div>

        <!-- 맞춤법/문법 체크 (결과 위) -->
        <div id="spell-area"></div>

        <!-- 결과 -->
        <div id="result" class="result-area">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
                </div>
                <p>문장을 입력하면 구조도가 여기에 표시됩니다</p>
            </div>
        </div>

        <!-- 히스토리 -->
        <div id="history-area"></div>

    </div>

    <script src="https://unpkg.com/compromise"></script>
    <script src="parser.js"></script>
    <script src="renderer.js"></script>
    <script data-goatcounter="https://kgh-kang.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
